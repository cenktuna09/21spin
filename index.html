<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>21 Spin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #canvas { display: block; width: 100%; height: 100%; }

      #hud {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
      }

      /* CSS2DRenderer label container */
      #css2d-labels {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 50;
      }

      .player-label {
        font-family: 'Press Start 2P', monospace;
        font-size: 9px;
        color: #FFD700;
        background: rgba(0,0,0,0.7);
        padding: 3px 8px;
        border-radius: 4px;
        border: 1px solid #FFD700;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
        text-shadow: 0 0 6px #FFD70066;
        text-align: center;
        line-height: 1.4;
      }
      .plabel-total {
        display: block;
        font-size: 13px;
        color: #fff;
        margin-top: 2px;
      }
      .plabel-total:empty { display: none; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="join-screen"></div>
    <div id="css2d-labels"></div>
    <div id="hud"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
